services:
  db:
    container_name: postgres
    image: postgres:16
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "novel"
    volumes:
      - db:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d novel"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  db: